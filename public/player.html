<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Syne:wght@600;700&display=swap');

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #0a0a0d;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    min-height: 100vh;
    padding: 28px;
    font-family: 'DM Mono', monospace;
  }

  /* ── BUBBLE ── */
  #bubble {
    position: fixed;
    bottom: 28px; right: 28px;
    width: 50px; height: 50px;
    border-radius: 50%;
    background: #141418;
    border: 1px solid rgba(255,255,255,.09);
    box-shadow: 0 8px 32px rgba(0,0,0,.7), 0 0 0 1px rgba(180,160,255,.06);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    transition: transform .2s, box-shadow .2s;
    z-index: 999;
  }
  #bubble:hover {
    transform: scale(1.1);
    box-shadow: 0 12px 40px rgba(0,0,0,.8), 0 0 0 1px rgba(180,160,255,.25);
  }
  #bubble.playing { border-color: rgba(180,160,255,.35); }
  #bubble.playing svg { animation: bpulse .9s ease-in-out infinite alternate; }
  @keyframes bpulse { from { opacity:.6 } to { opacity:1 } }

  /* ── PLAYER ── */
  #player {
    position: fixed;
    bottom: 28px; right: 28px;
    width: 310px;
    background: #141418;
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 18px;
    box-shadow: 0 28px 70px rgba(0,0,0,.8), 0 0 0 1px rgba(180,160,255,.04);
    z-index: 999;
    overflow: hidden;
    animation: rise .35s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes rise {
    from { opacity:0; transform:translateY(14px) scale(.96); }
    to   { opacity:1; transform:none; }
  }
  #player::before {
    content:'';
    position:absolute; top:0; left:16px; right:16px;
    height:1px;
    background: linear-gradient(90deg, transparent, rgba(180,160,255,.35), transparent);
  }

  .hdr {
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 15px 8px;
  }
  .hdr-label {
    font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase;
    color: rgba(255,255,255,.25);
  }
  #btn-close {
    width:22px; height:22px; border-radius:50%;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.08);
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: background .15s, border-color .15s;
  }
  #btn-close:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.18); }

  .info { padding: 2px 15px 14px; }
  .info-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
    color: #eeeef4; letter-spacing: -.3px; line-height: 1.25;
  }
  .info-artist {
    font-size: 10.5px; color: rgba(255,255,255,.32);
    margin-top: 3px; letter-spacing: .4px;
  }

  .wave {
    padding: 0 15px 10px;
    display:flex; align-items:flex-end; gap:2px; height:30px;
  }
  .wb {
    flex:1; border-radius:2px; min-height:2px;
    background: rgba(180,160,255,.1);
    transition: background .15s;
  }
  .wb.on { background: rgba(180,160,255,.45); }

  .seek { padding: 0 15px; }
  .seek-rail {
    position:relative; height:3px;
    background: rgba(255,255,255,.08);
    border-radius:99px; cursor:pointer;
  }
  .seek-fill {
    position:absolute; left:0; top:0; height:100%;
    background: linear-gradient(90deg,#9d8fdd,#c4b4ff);
    border-radius:99px; pointer-events:none;
    transition: width .1s linear;
  }
  .seek-dot {
    position:absolute; top:50%;
    width:12px; height:12px; border-radius:50%;
    background:#fff;
    transform: translate(-50%,-50%) scale(0);
    transition: transform .15s;
    pointer-events:none;
    box-shadow: 0 2px 8px rgba(0,0,0,.6);
  }
  .seek-rail:hover .seek-dot,
  .seek-rail.drag .seek-dot { transform: translate(-50%,-50%) scale(1); }

  .seek-times {
    display:flex; justify-content:space-between;
    font-size:9px; color:rgba(255,255,255,.25);
    margin-top:5px; letter-spacing:.3px;
  }

  .ctrls {
    display:flex; align-items:center; justify-content:center;
    gap:18px; padding:10px 15px;
  }
  .cbtn {
    background:none; border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    color: rgba(255,255,255,.35);
    transition: color .15s, transform .15s;
    padding:4px; border-radius:6px;
  }
  .cbtn:hover { color:rgba(255,255,255,.8); transform:scale(1.1); }

  #btn-play {
    width:46px; height:46px; border-radius:50%;
    background: #b8a8f0;
    border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    color: #16082e;
    box-shadow: 0 4px 22px rgba(180,160,255,.35);
    transition: background .15s, transform .15s, box-shadow .15s;
  }
  #btn-play:hover { background:#cbbeff; transform:scale(1.06); box-shadow:0 6px 30px rgba(180,160,255,.5); }
  #btn-play:active { transform:scale(.96); }

  .vol {
    display:flex; align-items:center; gap:8px;
    padding: 2px 15px 15px;
  }
  .vol-rail {
    flex:1; position:relative; height:3px;
    background: rgba(255,255,255,.08); border-radius:99px; cursor:pointer;
  }
  .vol-fill {
    position:absolute; left:0; top:0; height:100%;
    background: rgba(180,160,255,.45); border-radius:99px; pointer-events:none;
  }
  .vol-dot {
    position:absolute; top:50%;
    width:10px; height:10px; border-radius:50%;
    background:#b8a8f0;
    transform: translate(-50%,-50%) scale(0);
    transition: transform .15s; pointer-events:none;
  }
  .vol-rail:hover .vol-dot,
  .vol-rail.drag .vol-dot { transform: translate(-50%,-50%) scale(1); }
</style>
</head>
<body>

<div id="bubble">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
       stroke="#b8a8f0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 18V5l12-2v13"/>
    <circle cx="6" cy="18" r="3"/>
    <circle cx="18" cy="16" r="3"/>
  </svg>
</div>

<div id="player">
  <div class="hdr">
    <span class="hdr-label">Now Playing</span>
    <button id="btn-close">
      <svg width="9" height="9" viewBox="0 0 12 12" fill="none"
           stroke="rgba(255,255,255,.5)" stroke-width="1.8" stroke-linecap="round">
        <line x1="1" y1="1" x2="11" y2="11"/>
        <line x1="11" y1="1" x2="1" y2="11"/>
      </svg>
    </button>
  </div>

  <div class="info">
    <div class="info-title">Safest Place On Earth</div>
    <div class="info-artist">Nadav Cohen &amp; cxlt</div>
  </div>

  <div class="wave" id="wave"></div>

  <div class="seek">
    <div class="seek-rail" id="seek-rail">
      <div class="seek-fill" id="seek-fill" style="width:0%"></div>
      <div class="seek-dot"  id="seek-dot"  style="left:0%"></div>
    </div>
    <div class="seek-times">
      <span id="t-cur">0:00</span>
      <span id="t-dur">0:00</span>
    </div>
  </div>

  <div class="ctrls">
    <button class="cbtn" id="btn-rw" title="-10s">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
        <text x="8" y="16.5" font-size="6.5" fill="currentColor" stroke="none"
              font-family="monospace">10</text>
      </svg>
    </button>

    <button id="btn-play">
      <svg id="ico-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5.14v14l11-7-11-7z"/>
      </svg>
      <svg id="ico-pause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none">
        <rect x="6" y="5" width="4" height="14" rx="1"/>
        <rect x="14" y="5" width="4" height="14" rx="1"/>
      </svg>
    </button>

    <button class="cbtn" id="btn-fw" title="+10s">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <text x="8" y="16.5" font-size="6.5" fill="currentColor" stroke="none"
              font-family="monospace">10</text>
      </svg>
    </button>
  </div>

  <div class="vol">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
         stroke="rgba(255,255,255,.3)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
    </svg>
    <div class="vol-rail" id="vol-rail">
      <div class="vol-fill" id="vol-fill" style="width:80%"></div>
      <div class="vol-dot"  id="vol-dot"  style="left:80%"></div>
    </div>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
         stroke="rgba(255,255,255,.3)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
    </svg>
  </div>
</div>

<audio id="audio" preload="metadata">
  <source src="/music/Safest%20place%20on%20earth%20-%20Nadav%20Cohen%20(youtube).mp3" type="audio/mpeg">
</audio>

<script>
const audio    = document.getElementById('audio');
const player   = document.getElementById('player');
const bubble   = document.getElementById('bubble');
const btnPlay  = document.getElementById('btn-play');
const icoPlay  = document.getElementById('ico-play');
const icoPause = document.getElementById('ico-pause');
const seekRail = document.getElementById('seek-rail');
const seekFill = document.getElementById('seek-fill');
const seekDot  = document.getElementById('seek-dot');
const tCur     = document.getElementById('t-cur');
const tDur     = document.getElementById('t-dur');
const volRail  = document.getElementById('vol-rail');
const volFill  = document.getElementById('vol-fill');
const volDot   = document.getElementById('vol-dot');
const waveEl   = document.getElementById('wave');

// Decorative waveform
const BAR_N = 42;
Array.from({length:BAR_N}, () => Math.random()*78+12).forEach(h => {
  const d = document.createElement('div');
  d.className = 'wb';
  d.style.height = h + '%';
  waveEl.appendChild(d);
});
const bars = waveEl.querySelectorAll('.wb');
function updateWave(pct) {
  const n = Math.round(pct * BAR_N);
  bars.forEach((b,i) => b.classList.toggle('on', i < n));
}

function fmt(s) {
  s = Math.floor(s||0);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}
function clamp(v,a,b) { return Math.max(a,Math.min(b,v)); }
function pctFrom(e, el) {
  const r = el.getBoundingClientRect();
  return clamp(((e.touches?e.touches[0].clientX:e.clientX)-r.left)/r.width, 0, 1);
}

// Play/Pause
function setPlaying(v) {
  icoPlay.style.display  = v ? 'none'  : 'block';
  icoPause.style.display = v ? 'block' : 'none';
  bubble.classList.toggle('playing', v);
}
btnPlay.addEventListener('click', () => {
  audio.paused ? audio.play().then(()=>setPlaying(true)).catch(()=>{})
               : (audio.pause(), setPlaying(false));
});

// Seek
let sDrag = false;
function doSeek(e) {
  const p = pctFrom(e, seekRail);
  seekFill.style.width = p*100+'%';
  seekDot.style.left   = p*100+'%';
  updateWave(p);
  if (audio.duration) audio.currentTime = p * audio.duration;
}
seekRail.addEventListener('mousedown',  e=>{sDrag=true; seekRail.classList.add('drag'); doSeek(e);});
seekRail.addEventListener('touchstart', e=>{sDrag=true; seekRail.classList.add('drag'); doSeek(e);},{passive:true});
document.addEventListener('mousemove',  e=>{if(sDrag)doSeek(e);});
document.addEventListener('touchmove',  e=>{if(sDrag)doSeek(e);},{passive:true});
document.addEventListener('mouseup',    ()=>{sDrag=false; seekRail.classList.remove('drag');});
document.addEventListener('touchend',   ()=>{sDrag=false; seekRail.classList.remove('drag');});

// Volume
let vDrag = false;
function doVol(e) {
  const p = pctFrom(e, volRail);
  audio.volume = p;
  volFill.style.width = p*100+'%';
  volDot.style.left   = p*100+'%';
}
volRail.addEventListener('mousedown',  e=>{vDrag=true; volRail.classList.add('drag'); doVol(e);});
volRail.addEventListener('touchstart', e=>{vDrag=true; volRail.classList.add('drag'); doVol(e);},{passive:true});
document.addEventListener('mousemove',  e=>{if(vDrag)doVol(e);});
document.addEventListener('touchmove',  e=>{if(vDrag)doVol(e);},{passive:true});
document.addEventListener('mouseup',    ()=>{vDrag=false; volRail.classList.remove('drag');});
document.addEventListener('touchend',   ()=>{vDrag=false; volRail.classList.remove('drag');});

// Audio events
audio.addEventListener('timeupdate', () => {
  if (sDrag) return;
  const p = audio.duration ? audio.currentTime/audio.duration : 0;
  seekFill.style.width = p*100+'%';
  seekDot.style.left   = p*100+'%';
  tCur.textContent = fmt(audio.currentTime);
  updateWave(p);
});
audio.addEventListener('loadedmetadata', () => { tDur.textContent = fmt(audio.duration); });
audio.addEventListener('ended', () => setPlaying(false));

// Skip
document.getElementById('btn-rw').addEventListener('click', ()=>{ audio.currentTime=Math.max(0,audio.currentTime-10); });
document.getElementById('btn-fw').addEventListener('click', ()=>{ audio.currentTime=Math.min(audio.duration||0,audio.currentTime+10); });

// Minimize / Restore
document.getElementById('btn-close').addEventListener('click', ()=>{
  player.style.display='none';
  bubble.style.display='flex';
});
bubble.addEventListener('click', ()=>{
  bubble.style.display='none';
  player.style.display='block';
  player.style.animation='none';
  requestAnimationFrame(()=>{ player.style.animation=''; });
});

audio.volume = 0.8;
</script>
</body>
</html>
